<style>
:root {
  --bg:#faf9f6;--card:#fff;--border:#e8e5e0;--text:#1a1a1a;--muted:#8a8580;
  --accent:#c5a55a;--green:#2d8a4e;--red:#c0392b;--blue:#2563eb;
  --font-d:'Playfair Display',Georgia,serif;--font-b:'Source Sans 3',sans-serif;--font-m:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3{font-family:var(--font-d)}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes recPulse{0%,100%{background:linear-gradient(180deg,#1a0000,#0f0000)}50%{background:linear-gradient(180deg,#2a0505,#1a0202)}}
@keyframes expGlow{0%,100%{background:linear-gradient(180deg,#071a0e,#050f07)}50%{background:linear-gradient(180deg,#0a2614,#07180b)}}
@keyframes newspaperDrop{from{opacity:0;transform:translateY(-40px) rotateX(15deg)}to{opacity:1;transform:translateY(0) rotateX(0)}}
@keyframes stampIn{0%{transform:scale(3) rotate(-12deg);opacity:0}60%{transform:scale(1) rotate(-12deg);opacity:1}100%{transform:scale(1) rotate(-12deg);opacity:1}}
@keyframes scoreUp{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}

.container{max-width:1200px;margin:0 auto;padding:28px 24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.btn{font-family:var(--font-b);border:none;border-radius:10px;padding:12px 28px;font-weight:700;font-size:15px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-primary{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);color:var(--accent)}
.btn-gold{background:linear-gradient(135deg,#c5a55a,#b8943f);color:#1a1a1a}
.btn-green{background:linear-gradient(135deg,var(--green),#228b3b);color:#fff}
.btn-red{background:linear-gradient(135deg,var(--red),#a93226);color:#fff}
.btn-outline{background:#fff;border:2px solid var(--border);color:var(--muted)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}

/* Tabs */
.tabs{display:flex;gap:4px;background:#f0eeeb;border-radius:12px;padding:4px;margin-bottom:20px}
.tab{flex:1;text-align:center;padding:10px 14px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;transition:.15s;border:none;background:transparent;font-family:var(--font-b);color:var(--muted)}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab:hover:not(.active){color:var(--text)}

/* Allocation */
.alloc-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;border:1px solid transparent;transition:.15s}
.alloc-row:hover{background:#fafaf8}
.alloc-icon{font-size:22px;width:32px;text-align:center}
.alloc-name{font-weight:700;font-size:13px;min-width:110px}
.alloc-bar-wrap{flex:1;height:10px;background:#f0eeeb;border-radius:6px;overflow:hidden}
.alloc-bar{height:100%;border-radius:6px;transition:width .2s}
.alloc-amt{font-family:var(--font-m);font-weight:700;font-size:15px;min-width:45px;text-align:right}
.alloc-btn{width:34px;height:34px;border-radius:8px;border:2px solid var(--border);background:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.1s;color:var(--text)}
.alloc-btn:hover{background:#f5f5f0;border-color:var(--text)}
.alloc-btn:disabled{opacity:.2;cursor:not-allowed}

/* Newspaper */
.newspaper{background:#fffff5;border:3px solid #1a1a1a;border-radius:4px;padding:36px 44px;text-align:center;position:relative;overflow:hidden;animation:newspaperDrop .6s ease}
.newspaper-mast{font-family:var(--font-d);font-size:12px;letter-spacing:6px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid #1a1a1a;padding-bottom:8px;margin-bottom:16px}
.newspaper-hl{font-family:var(--font-d);font-size:42px;font-weight:900;line-height:1.12;margin-bottom:14px;color:#1a1a1a}
.newspaper-sub{font-size:18px;color:#555;font-style:italic;line-height:1.4;margin-bottom:10px}
.newspaper-year{font-family:var(--font-m);font-size:13px;color:var(--muted);letter-spacing:2px}
.newspaper-stamp{position:absolute;top:16px;right:20px;font-family:var(--font-m);font-weight:700;font-size:28px;padding:8px 22px;border:4px solid;border-radius:6px;transform:rotate(-12deg);animation:stampIn .4s ease .8s both}

/* Return breakdown */
.ret-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.ret-card{padding:16px 18px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);overflow:hidden}
.ret-card-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.ret-total{font-family:var(--font-m);font-weight:800;font-size:22px;white-space:nowrap}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:12px;margin-bottom:6px;transition:.2s}
.lb-row:hover{background:#fafaf8}
.lb-rank{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;flex-shrink:0}
.lb-name{flex:1;font-weight:700;font-size:17px}
.lb-val{font-family:var(--font-m);font-weight:800;font-size:22px}
.lb-change{font-family:var(--font-m);font-size:12px;font-weight:600;margin-left:8px}

/* Commentary */
.commentary{background:#1a1a1a;color:#e8e5e0;border-radius:14px;padding:22px 26px;font-size:16px;line-height:1.65;position:relative}
.commentary::before{content:'📢';position:absolute;top:-14px;left:22px;font-size:26px}

/* Table */
table{width:100%;border-collapse:collapse}
th{font-family:var(--font-m);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:2px solid var(--border)}
td{padding:10px;border-bottom:1px solid #f0eeeb;font-size:14px}

/* Round screen */
.round-screen{min-height:100vh;padding:28px 24px;transition:background .6s}
.round-screen.bull{animation:expGlow 3s infinite}
.round-screen.bear{animation:recPulse 3s infinite}

/* Phase badge */
.phase-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700}

@media(min-width:1200px){
  .container{max-width:1200px;padding:32px}
  .newspaper-hl{font-size:48px}
  .lb-val{font-size:26px}
}
</style>

};

    firebase.initializeApp(FIREBASE_CONFIG);

    fbConnected = true;
  }
} catch(e) { console.log('Firebase not configured yet:', e.message); }

function loadPortfoliosFromFirebase() {
  if (!fbConnected) { alert('Firebase not configured. Edit the FIREBASE_CONFIG in dm.html.'); return; }
  const statusEl = document.getElementById('fbStatus');
  if (statusEl) statusEl.textContent = 'Loading...';
  fbDB.ref('portfolios').once('value').then(snap => {
    const data = snap.val();
    if (!data) { if (statusEl) statusEl.textContent = 'No portfolios found. Have kids submit first.'; return; }
    const loaded = [];
    Object.entries(data).forEach(([key, val]) => {
      if (val.name && val.portfolio) {
        const port = {};
        Object.entries(val.portfolio).forEach(([sid, amt]) => { port[sid] = Number(amt); });
        // Skip if this player already exists
        if (!S.players.find(p => p.name === val.name)) {
          loaded.push({ name: val.name, portfolio: {...port}, initialPortfolio: {...port}, history: [BUDGET] });
        }
      }
    });
    S.players = [...S.players, ...loaded];
    if (statusEl) statusEl.textContent = loaded.length > 0 ? '✓ Loaded ' + loaded.length + ' portfolios!' : 'No new portfolios to load.';
    playReveal();
    render();
  }).catch(err => {
    if (statusEl) statusEl.textContent = 'Error: ' + err.message;
  });
}

function clearFirebasePortfolios() {
  if (!fbConnected) return;
  if (confirm('Clear all submitted portfolios from Firebase? Kids will need to re-submit.')) {
    fbDB.ref('portfolios').remove().then(() => { alert('Cleared.'); }).catch(err => alert('Error: ' + err.message));
  }
}

let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,t){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function playBullWin(){[523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,.3,'triangle'),i*120))}

// ===================== LOGIC =====================
function genMag(){return .5+(Math.random()+Math.random())/2}
function getNews(phase,used){const all=NEWS.map((e,i)=>({...e,idx:i}));let pool=all.filter(e=>e.phases.includes(phase)&&!used.has(e.idx));if(!pool.length)pool=all.filter(e=>e.phases.includes(phase));return pool[Math.floor(Math.random()*pool.length)]}
function calcReturns(phase,news,mag){const cp=PHASES.find(c=>c.id===phase),m=MULTS[phase],ret={};SECTORS.forEach(s=>{const base=cp.ret*m[s.id]*mag,ne=(news.effects[s.id]||0)*mag,div=s.div*DIV_INFLATE/2;ret[s.id]={base,news:ne,dividend:div,total:base+ne+div}});return ret}
function portReturn(port,ret){let tw=0,wr=0;Object.entries(port).forEach(([sid,amt])=>{if(amt>0){tw+=amt;if(sid==='cash'){wr+=amt*CASH_RATE}else if(ret[sid]){wr+=amt*ret[sid].total}}});return tw>0?wr/tw:0}
function getPE(sid,phase){const s=SECTORS.find(x=>x.id===sid),cp=PHASES.find(c=>c.id===phase),m=MULTS[phase]?.[sid]||1;let adj=s.basePE;if(cp.mood==='bull')adj=s.basePE*(1+(m-1)*.5);else adj=s.basePE*(1-(m-1)*.3);return Math.max(5,Math.round(adj))}

function genCommentary(players,ret,idxR,phase){
  const lines=[],cp=PHASES.find(c=>c.id===phase);
  const sorted=[...players].sort((a,b)=>portReturn(b.portfolio,ret)-portReturn(a.portfolio,ret));
  if(sorted.length>0){const best=sorted[0],br=portReturn(best.portfolio,ret),ts=Object.entries(best.portfolio).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]),tn=SECTORS.find(s=>s.id===ts[0]?.[0])?.name||'';
    if(br>0)lines.push(`🏆 ${best.name} leads this round — heavy bet on ${tn} paid off!`);else lines.push(`📉 Tough round — but ${best.name} lost less than anyone else.`)}
  if(sorted.length>1){const worst=sorted[sorted.length-1],wr=portReturn(worst.portfolio,ret);if(wr<-.05)lines.push(`💸 ${worst.name} took a hit. Sometimes the market has other plans.`)}
  const beat=players.filter(p=>portReturn(p.portfolio,ret)>idxR);
  if(beat.length===0&&players.length>0)lines.push(`📊 Nobody beat the index this round — diversification wins!`);
  else if(beat.length===players.length&&players.length>0)lines.push(`🎯 Everyone beat the index! But can it last?`);
  if(cp.mood==='bear')lines.push(`💰 Dividend payers like ${SECTORS.filter(s=>s.div>=.02).map(s=>s.name).slice(0,2).join(' & ')} cushioned the blow.`);
  return lines;
}

    const eqTotal=total-cashA;if(eqTotal>0)wb/=eqTotal;else wb=0;
    const offPct=eqTotal>0?Math.round((offA/eqTotal)*100):0;
    const levels=[{n:'Conservative',c:'#1d4ed8',t:.75},{n:'Mod. Conservative',c:'#3b82f6',t:.9},{n:'Moderate',c:'#ca8a04',t:1.1},{n:'Mod. Aggressive',c:'#ea580c',t:1.25},{n:'Aggressive',c:'#dc2626',t:99}];

      <button class="btn btn-sm ${S.dmMode?'btn-primary':'btn-outline'}" onclick="setState({dmMode:!S.dmMode})">${S.dmMode?'🔒 Lock':'✏️ Edit'}</button>
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap">${S.cycle.map((pid,i)=>{const ph=PHASES.find(c=>c.id===pid);return `<div class="cyc-chip" data-idx="${i}" style="padding:6px 10px;border-radius:8px;border:2px solid ${ph.color}40;background:${ph.color}12;font-size:10px;font-weight:700;color:${ph.color};text-align:center;cursor:${S.dmMode?'pointer':'default'};min-width:72px;font-family:var(--font-b);transition:.1s"><div style="font-size:16px">${ph.icon}</div><div>R${i+1}</div><div style="font-size:8px">${ph.name}</div></div>`}).join('')}
    ${S.dmMode?`<div onclick="rmCycRound()" style="padding:6px 10px;border-radius:8px;border:2px dashed var(--red)40;cursor:pointer;font-size:20px;color:var(--red);display:flex;align-items:center;justify-content:center;min-width:40px;opacity:${S.cycle.length>3?'1':'0.3'}">&minus;</div><div onclick="addCycRound()" style="padding:6px 10px;border-radius:8px;border:2px dashed var(--border);cursor:pointer;font-size:20px;color:var(--muted);display:flex;align-items:center;justify-content:center;min-width:40px">+</div>`:''}</div>

    <div style="font-size:12px;color:var(--muted);margin-top:10px">📋 Rules: ${MAX_SECTORS} sectors + optional cash · ${(MGMT_FEE*100).toFixed(1)}% management fee per round · Index is free</div>
  </div>`:''}

  <!-- Market Context: Where Are We Now? -->
  <div class="card" style="padding:28px 32px;margin-top:14px">
    <h3 style="font-size:20px;margin:0 0 4px;text-align:center">📈 The Economy Right Now</h3>
    ${(()=>{
      const fp=S.cycle[0],ph=PHASES.find(p=>p.id===fp);
      // Determine narrative based on first phase
      const isGrowth=['expansion','minor_expansion','peak'].includes(fp);
      const isRecovery=['early_recovery'].includes(fp);
      // isDecline covers minor_recession, major_recession, trough
      const subtitle=isGrowth?'Markets have been growing — but what comes next?':isRecovery?'The economy is recovering from a downturn — will it hold?':'The economy has been slowing — how bad will it get?';
      const lineColor=isGrowth?'#2d8a4e':isRecovery?'#eab308':'#c0392b';
      // Different curve shapes
      const curvePath=isGrowth
        ?'M 30 140 C 80 135, 120 120, 180 100 C 240 80, 300 60, 380 45 C 430 36, 490 32, 570 30'
        :isRecovery
        ?'M 30 50 C 80 60, 140 100, 220 130 C 280 145, 340 148, 400 140 C 440 130, 500 110, 570 90'
        :'M 30 40 C 80 45, 140 60, 220 85 C 300 115, 380 135, 450 150 C 500 158, 540 162, 570 165';
      const dotY=isGrowth?30:isRecovery?90:165;
      const labels=isGrowth
        ?'<text x="100" y="155" font-size="9" fill="#65a30d" font-family="var(--font-b)" font-weight="600" text-anchor="middle">Recovery</text><text x="280" y="80" font-size="9" fill="#16a34a" font-family="var(--font-b)" font-weight="600" text-anchor="middle">Growth</text><text x="480" y="22" font-size="10" fill="'+lineColor+'" font-family="var(--font-b)" font-weight="700" text-anchor="middle">🚀 Expansion</text>'
        :isRecovery
        ?'<text x="100" y="42" font-size="9" fill="#c0392b" font-family="var(--font-b)" font-weight="600" text-anchor="middle">Prior Peak</text><text x="280" y="155" font-size="9" fill="#c0392b" font-family="var(--font-b)" font-weight="600" text-anchor="middle">Downturn</text><text x="480" y="100" font-size="10" fill="'+lineColor+'" font-family="var(--font-b)" font-weight="700" text-anchor="middle">🌱 Recovering</text>'
        :'<text x="100" y="32" font-size="9" fill="#2d8a4e" font-family="var(--font-b)" font-weight="600" text-anchor="middle">Prior Peak</text><text x="300" y="115" font-size="9" fill="#ea580c" font-family="var(--font-b)" font-weight="600" text-anchor="middle">Slowing</text><text x="500" y="158" font-size="10" fill="'+lineColor+'" font-family="var(--font-b)" font-weight="700" text-anchor="middle">📉 Declining</text>';
      const bottomText=isGrowth?'The economy has been expanding. Will it keep going — or is a downturn ahead?':isRecovery?'Things are recovering from a rough patch. Will the momentum continue?':'The economy is weakening. Will it stabilize — or get worse?';
      return `<div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:18px">${subtitle}</div>
    <div style="overflow-x:auto">
      <svg width="100%" height="200" viewBox="0 0 800 200" preserveAspectRatio="xMidYMid meet">
        <line x1="0" y1="100" x2="800" y2="100" stroke="#e8e5e0" stroke-width="1" stroke-dasharray="4 4"/>
        <line x1="0" y1="50" x2="800" y2="50" stroke="#e8e5e0" stroke-width="0.5" stroke-dasharray="2 4"/>
        <line x1="0" y1="150" x2="800" y2="150" stroke="#e8e5e0" stroke-width="0.5" stroke-dasharray="2 4"/>
        <text x="60" y="192" font-size="10" fill="#b8b3ae" font-family="var(--font-m)" text-anchor="middle">18 mo ago</text>
        <text x="180" y="192" font-size="10" fill="#b8b3ae" font-family="var(--font-m)" text-anchor="middle">12 mo ago</text>
        <text x="310" y="192" font-size="10" fill="#b8b3ae" font-family="var(--font-m)" text-anchor="middle">6 mo ago</text>
        <text x="450" y="192" font-size="10" fill="#b8b3ae" font-family="var(--font-m)" text-anchor="middle">3 mo ago</text>
        <text x="570" y="192" font-size="11" fill="${lineColor}" font-family="var(--font-m)" font-weight="700" text-anchor="middle">TODAY</text>
        <path d="${curvePath}" fill="none" stroke="${lineColor}" stroke-width="5" stroke-linecap="round" opacity="0.08"/>
        <path d="${curvePath}" fill="none" stroke="${lineColor}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${labels}
        <circle cx="570" cy="${dotY}" r="8" fill="${lineColor}" stroke="white" stroke-width="3"/>
        <circle cx="570" cy="${dotY}" r="3" fill="white"/>
        <line x1="570" y1="${dotY+12}" x2="570" y2="175" stroke="${lineColor}" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.3"/>
        <circle cx="600" cy="${dotY+2}" r="2.5" fill="#c5a55a" opacity="0.5"/>
        <circle cx="620" cy="${dotY+4}" r="2" fill="#c5a55a" opacity="0.35"/>
        <circle cx="638" cy="${dotY+6}" r="1.5" fill="#c5a55a" opacity="0.2"/>
        <text x="700" y="85" font-size="72" fill="#c5a55a" font-family="var(--font-d)" font-weight="900" text-anchor="middle" opacity="0.25">?</text>
        <text x="700" y="120" font-size="11" fill="#c5a55a" font-family="var(--font-b)" font-weight="700" text-anchor="middle" opacity="0.5">What happens next?</text>
        <text x="10" y="50" font-size="8" fill="#ccc" font-family="var(--font-m)" text-anchor="start">Growth</text>
        <text x="10" y="155" font-size="8" fill="#ccc" font-family="var(--font-m)" text-anchor="start">Decline</text>
      </svg>
    </div>
    <div style="text-align:center;margin-top:8px;font-size:13px;color:var(--muted)">${bottomText} <strong style="color:var(--text)">That's the game.</strong></div>`;
    })()}
  </div>

  <!-- Player Lobby -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:20px;margin:0">👥 Player Lobby ${S.players.length>0?'('+S.players.length+' ready)':''}</h3>
      <div style="display:flex;gap:8px">
        <button id="firebaseBtn" class="btn btn-sm btn-gold" onclick="loadFromFirebase()">🔄 Load Portfolios from Players</button>
        <button class="btn btn-sm btn-outline" onclick="loadDemoPlayers()">🧪 Demo Players</button>
        ${S.players.length>0?`<button class="btn btn-sm btn-outline" onclick="setState({players:[]})">Clear All</button>`:''}
        <button class="btn btn-sm btn-outline" onclick="newGame()" title="Clear Firebase and start completely fresh">🆕 New Game</button>
      </div>
    </div>

    ${S.players.length===0?`
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:12px;opacity:0.3">📱</div>
        <div style="font-size:18px;font-weight:700;color:var(--muted);margin-bottom:6px">Waiting for players...</div>
        <div style="font-size:13px;color:var(--muted)">Players will appear here as they submit portfolios from their devices.<br>Use "Load Demo Players" to test the game.</div>
      </div>
    `:` 
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px">
        ${S.players.map((p,i)=>{
          const risk=calcRisk(p.portfolio);
          const holdings=Object.entries(p.portfolio).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
          const hasCash=p.portfolio.cash>0;
          return `<div style="background:var(--card);border:2px solid ${risk.color}30;border-radius:14px;padding:18px;position:relative">
            <button onclick="rmPlayer(${i})" style="position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px">✕</button>
            <div style="font-family:var(--font-d);font-size:20px;font-weight:900;margin-bottom:10px">${p.name}</div>
            
            <!-- Holdings bars -->
            <div style="margin-bottom:12px">${holdings.map(([sid,amt])=>{
              const s=sid==='cash'?{icon:'🏦',name:'Cash',color:'#059669'}:SECTORS.find(x=>x.id===sid);
              return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <span style="font-size:16px;width:22px;text-align:center">${s.icon}</span>
                <span style="font-size:12px;font-weight:700;color:${s.color};min-width:80px">${s.name}</span>
                <div style="flex:1;height:8px;background:#f0eeeb;border-radius:4px;overflow:hidden"><div style="height:100%;width:${(amt/BUDGET)*100}%;background:${s.color};border-radius:4px"></div></div>
                <span style="font-family:var(--font-m);font-size:13px;font-weight:700;color:${s.color};min-width:40px;text-align:right">$${amt}</span>
              </div>`;
            }).join('')}</div>

            <!-- Risk badge -->
            <div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)">
              <div>
                <div style="font-size:10px;color:var(--muted);margin-bottom:2px">RISK APPETITE</div>
                <div style="font-family:var(--font-d);font-size:16px;font-weight:900;color:${risk.color}">${risk.label}</div>
              </div>
              <div style="display:flex;gap:14px;font-size:11px">
                <div style="text-align:center"><div style="color:var(--muted)">Beta</div><div style="font-family:var(--font-m);font-weight:700;color:${risk.color}">${risk.beta.toFixed(2)}</div></div>
                <div style="text-align:center"><div style="color:var(--muted)">Off/Def</div><div style="font-family:var(--font-m);font-weight:700"><span style="color:#c0392b">${risk.offPct}</span>/<span style="color:#1d4ed8">${risk.defPct}</span></div></div>
                ${hasCash?`<div style="text-align:center"><div style="color:var(--muted)">Cash</div><div style="font-family:var(--font-m);font-weight:700;color:#059669">${risk.cashPct}%</div></div>`:''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `}
  </div>

  <div style="text-align:center;margin-top:20px"><button class="btn btn-primary" style="font-size:18px;padding:16px 52px" ${S.players.length<1?'disabled':''} onclick="startGame()">🎬 Start Game (${S.players.length} players)</button></div>
  </div>`;
}

// ===================== PLAY (DASHBOARD) =====================
function renderPlay(){
  const gameOver=S.curRound>=S.cycle.length,canRebal=S.curRound>0&&!gameOver;
  return `<div class="container" style="animation:fadeIn .3s ease">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
    <div><h2 style="font-size:26px;margin:0">🐂 Market Cycle Game</h2><div style="font-size:14px;color:var(--muted)">Round ${Math.min(S.curRound+1,S.cycle.length)} of ${S.cycle.length}</div></div>
    <div style="display:flex;gap:8px">${canRebal&&!S.rebalOpen?`<button id="rebalBtn" class="btn btn-sm btn-outline" onclick="enableRebalance()" title="Open rebalance window for players">⚖️ Rebalance</button>`:canRebal&&S.rebalOpen?`<button id="rebalLoadBtn" class="btn btn-sm btn-green" onclick="loadRebalanced()">🔄 Load Rebalanced</button>`:''}<button class="btn btn-sm btn-outline" onclick="endGameEarly()" title="End game and show final results">🏁 End Game</button>${gameOver?`<button class="btn btn-gold" onclick="showResults()">🏆 Final Results</button>`:`<button class="btn btn-primary" onclick="startRound()">▶ Next Round</button>`}</div>
  </div>
  <div class="card" style="padding:16px 24px">${renderSCurve()}</div>
  <div class="tabs">
    <button class="tab ${S.playTab==='dashboard'?'active':''}" onclick="setState({playTab:'dashboard'})">📊 Dashboard</button>
    <button class="tab ${S.playTab==='leaderboard'?'active':''}" onclick="setState({playTab:'leaderboard'})">🏆 Leaderboard</button>
    <button class="tab ${S.playTab==='players'?'active':''}" onclick="setState({playTab:'players'})">👥 Players</button>
    <button class="tab ${S.playTab==='sectors'?'active':''}" onclick="setState({playTab:'sectors'})">📈 Sectors</button>
    <button class="tab ${S.playTab==='history'?'active':''}" onclick="setState({playTab:'history'})">📜 History</button>
  </div>
  ${S.playTab==='dashboard'?renderDashboard():''}${S.playTab==='leaderboard'?renderLeaderboard():''}${S.playTab==='players'?renderPlayers():''}${S.playTab==='sectors'?renderSectorExplorer():''}${S.playTab==='history'?renderHistory():''}
  </div>`;
}

function renderSCurve(){
  const n=S.cycle.length,cr=S.curRound;
  const yMap=pid=>{const ph=PHASES.find(p=>p.id===pid);return ph.mood==='bull'?(ph.ret>.1?18:28):(ph.ret<-.1?68:56)};
  const ys=S.cycle.map(pid=>yMap(pid));
  const w=n*110+160;
  const lastDone=cr-1;

  // Solid line through completed rounds
  const pastLine=cr>0?ys.slice(0,cr).map((y,i)=>`${i*110+55},${y}`).join(' '):'';

  // Scenario projections — show from round 0 onward
  let scenarioSVG='';
  if(cr<n){
    const startX=cr===0?55:lastDone*110+55;
    const startY=cr===0?40:ys[lastDone];// neutral midpoint if no rounds played
    const remaining=n-cr;const scLen=Math.min(remaining+1,4);
    const scenarios=[
      {name:"Continued Growth",color:"#16a34a",yEnd:Math.max(5,startY-30),dash:"8 4"},
      {name:"Soft Landing",color:"#eab308",yEnd:startY,dash:"6 6"},
      {name:"Recession",color:"#dc2626",yEnd:Math.min(80,startY+30),dash:"4 4"}
    ];
    scenarios.forEach(sc=>{
      const pts=[];for(let i=0;i<=scLen;i++){const x=startX+(i*110);const y=startY+(sc.yEnd-startY)*(i/scLen);pts.push(`${x},${y}`);}
      scenarioSVG+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${sc.color}" stroke-width="2.5" stroke-dasharray="${sc.dash}" opacity="0.5"/>`;
      const endX=startX+scLen*110,endY=sc.yEnd;
      scenarioSVG+=`<text x="${endX+8}" y="${endY+4}" font-size="11" font-family="var(--font-b)" fill="${sc.color}" font-weight="700" opacity="0.7">${sc.name}</text>`;
    });
  }

  // Current position dot (before any rounds played)
  const curDotSVG=cr===0?`<circle cx="55" cy="40" r="10" fill="var(--accent)" stroke="white" stroke-width="3" opacity="1"/>
    <text x="55" y="86" text-anchor="middle" font-size="10" font-family="var(--font-m)" fill="var(--accent)" font-weight="700">📍 NOW</text>`:'';

  return `<div style="overflow-x:auto"><svg width="100%" height="90" viewBox="0 0 ${w} 90" preserveAspectRatio="xMinYMid meet">
    ${S.cycle.map((pid,i)=>{const ph=PHASES.find(p=>p.id===pid);return `<rect x="${i*110}" y="0" width="110" height="90" fill="${ph.color}" opacity="${i<cr?0.08:i===cr?0.12:0.03}" rx="4"/>`}).join('')}
    ${pastLine?`<polyline points="${pastLine}" fill="none" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>`:''}
    ${scenarioSVG}
    ${curDotSVG}
    ${S.cycle.map((pid,i)=>{const ph=PHASES.find(p=>p.id===pid);const isPast=i<cr&&i<lastDone;const isLastDone=i===lastDone&&cr>0;const isFuture=i>=cr;
      if(isLastDone) return `<circle cx="${i*110+55}" cy="${ys[i]}" r="10" fill="${ph.color}" stroke="white" stroke-width="3" opacity="1"/>
        <text x="${i*110+55}" y="86" text-anchor="middle" font-size="10" font-family="var(--font-m)" fill="${ph.color}" font-weight="700">${ph.icon} R${i+1}</text>`;
      if(isPast) return `<circle cx="${i*110+55}" cy="${ys[i]}" r="6" fill="${ph.color}" stroke="white" stroke-width="2" opacity="0.6"/>
        <text x="${i*110+55}" y="86" text-anchor="middle" font-size="9" font-family="var(--font-m)" fill="${ph.color}" font-weight="400">${ph.icon} R${i+1}</text>`;
      return `<circle cx="${i*110+55}" cy="${ys[i]}" r="4" fill="#e8e5e0" stroke="white" stroke-width="1.5" opacity="0.25"/>
        <text x="${i*110+55}" y="86" text-anchor="middle" font-size="9" font-family="var(--font-m)" fill="#ccc" font-weight="400">R${i+1}</text>`;
    }).join('')}
  </svg></div>`;
}

function renderDashboard(){
  const maxV=Math.max(...S.idxHist,...S.players.flatMap(p=>p.history)),minV=Math.min(...S.idxHist,...S.players.flatMap(p=>p.history)),range=maxV-minV||1;
  const cH=280,cW=900,pts=S.idxHist.length;
  function tp(arr){return arr.map((v,i)=>{const x=pts>1?(i/(pts-1))*cW:cW/2;const y=cH-((v-minV)/range)*(cH-20)-10;return `${i===0?'M':'L'} ${x.toFixed(1)} ${y.toFixed(1)}`}).join(' ')}
  const colors=['#2563eb','#dc2626','#16a34a','#9333ea','#ea580c','#0891b2','#c026d3','#65a30d','#f59e0b','#6366f1'];
  return `<div class="card">
    <h3 style="font-size:17px;margin:0 0 14px">Portfolio Performance</h3>
    <div style="height:${cH}px"><svg width="100%" height="100%" viewBox="0 0 ${cW} ${cH}" preserveAspectRatio="none">
      ${[0,.25,.5,.75,1].map(p=>{const y=cH-p*(cH-20)-10,val=minV+p*range;return `<line x1="0" y1="${y}" x2="${cW}" y2="${y}" stroke="#e8e5e0" stroke-width=".5"/><text x="${cW+5}" y="${y+4}" font-size="10" fill="var(--muted)" font-family="var(--font-m)">$${Math.round(val)}</text>`}).join('')}
      <path d="${tp(S.idxHist)}" fill="none" stroke="#a8a29e" stroke-width="2.5" stroke-dasharray="6 4"/>
      ${S.players.map((p,i)=>`<path d="${tp(p.history)}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="2.5"/>`).join('')}
    </svg></div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:13px">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:20px;height:2px;background:#a8a29e;border-top:1px dashed #a8a29e"></div><span style="color:var(--muted)">Index</span></div>
      ${S.players.map((p,i)=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:3px;background:${colors[i%colors.length]};border-radius:2px"></div><span style="font-weight:600">${p.name}</span></div>`).join('')}
    </div></div>
  ${S.commentary.length?`<div class="commentary">${S.commentary.map(l=>`<div style="margin-bottom:6px">${l}</div>`).join('')}</div>`:''}`;
}

function renderLeaderboard(){
  const idxV=S.idxHist[S.idxHist.length-1];
  const entries=[...S.players.map(p=>({name:p.name,val:p.history[p.history.length-1],isIdx:false})),{name:'Market Index',val:idxV,isIdx:true}].sort((a,b)=>b.val-a.val);
  const rc=['#c5a55a','#94a3b8','#b45309','#475569','#475569','#475569','#475569','#475569','#475569','#475569'];
  return `<div class="card"><h3 style="font-size:17px;margin:0 0 14px">Leaderboard</h3>
    ${entries.map((e,i)=>{const bi=!e.isIdx&&e.val>idxV;
      if(e.isIdx) return `<div class="lb-row" style="background:#f5f4f0;border:2px dashed var(--border)"><div class="lb-rank" style="background:var(--muted)">📊</div><div class="lb-name" style="color:var(--muted)">Market Index</div><span class="lb-val" style="color:var(--muted)">$${e.val.toFixed(0)}</span></div>`;
      return `<div class="lb-row"><div class="lb-rank" style="background:${rc[i]}">${i+1}</div><div class="lb-name">${e.name} ${bi?'<span style="font-size:11px;color:var(--green)">✓ beats index</span>':''}</div><span class="lb-val" style="color:${bi?'var(--green)':'var(--red)'}">$${e.val.toFixed(0)}</span></div>`;
    }).join('')}</div>`;
}

function renderPlayers(){
  const idxV=S.idxHist[S.idxHist.length-1];
  const colors=['#2563eb','#dc2626','#16a34a','#9333ea','#ea580c','#0891b2','#c026d3','#65a30d','#f59e0b','#6366f1'];
  const sorted=[...S.players].map((p,oi)=>({...p,val:p.history[p.history.length-1],color:colors[oi%colors.length]})).sort((a,b)=>b.val-a.val);
  return `<div class="card"><h3 style="font-size:17px;margin:0 0 14px">👥 Player Portfolios</h3>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">
  ${sorted.map((p,rank)=>{
    const ret=((p.val-BUDGET)/BUDGET*100).toFixed(1);
    const beatsIdx=p.val>idxV;
    const holdings=Object.entries(p.portfolio).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    const total=holdings.reduce((s,[,v])=>s+v,0);
    // Weighted beta
    let wb=0;holdings.forEach(([sid,amt])=>{if(sid==='cash')return;const s=SECTORS.find(x=>x.id===sid);if(s)wb+=s.beta*amt});
    const eqAmt=total-(p.portfolio.cash||0);if(eqAmt>0)wb/=eqAmt;
    const offAmt=holdings.reduce((s,[sid,amt])=>{const sec=SECTORS.find(x=>x.id===sid);return sec&&sec.type==='offensive'?s+amt:s},0);
    const offPct=total>0?Math.round((offAmt/total)*100):0;
    return `<div style="background:var(--card);border:2px solid ${p.color}30;border-radius:14px;padding:20px;position:relative">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div>
          <div style="font-family:var(--font-d);font-size:22px;font-weight:900">${p.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">#${rank+1} · β ${wb.toFixed(2)} · <span style="color:${offPct>0?'#c0392b':'#1d4ed8'}">${offPct}% offensive</span></div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--font-m);font-size:24px;font-weight:800;color:${beatsIdx?'var(--green)':'var(--red)'}">$${p.val.toFixed(0)}</div>
          <div style="font-size:12px;color:${beatsIdx?'var(--green)':'var(--red)'}">${ret>0?'+':''}${ret}% ${beatsIdx?'✓ beats index':'✗ behind'}</div>
        </div>
      </div>
      <!-- Holdings breakdown -->
      ${holdings.map(([sid,amt])=>{
        const s=sid==='cash'?{icon:'🏦',name:'Cash',color:'#059669'}:SECTORS.find(x=>x.id===sid);
        if(!s)return '';
        const pct=total>0?Math.round((amt/total)*100):0;
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:18px;width:24px;text-align:center">${s.icon}</span>
          <span style="font-size:13px;font-weight:700;color:${s.color};min-width:110px">${s.name}</span>
          <div style="flex:1;height:10px;background:#f0eeeb;border-radius:5px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${s.color};border-radius:5px"></div></div>
          <span style="font-family:var(--font-m);font-size:14px;font-weight:700;color:${s.color};min-width:55px;text-align:right">$${amt} <span style="font-size:10px;color:var(--muted)">${pct}%</span></span>
        </div>`;
      }).join('')}
      <!-- Mini sparkline -->
      ${p.history.length>1?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:600;margin-bottom:4px">PERFORMANCE</div>
        <svg viewBox="0 0 200 40" width="100%" height="40" preserveAspectRatio="none">
          ${(()=>{const mn=Math.min(...p.history),mx=Math.max(...p.history),rng=mx-mn||1;
            const pts=p.history.map((v,i)=>`${(i/(p.history.length-1))*200},${40-((v-mn)/rng)*36-2}`).join(' ');
            return `<polyline points="${pts}" fill="none" stroke="${p.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="0" y1="${40-((BUDGET-mn)/rng)*36-2}" x2="200" y2="${40-((BUDGET-mn)/rng)*36-2}" stroke="#e8e5e0" stroke-width="1" stroke-dasharray="3 3"/>`;
          })()}
        </svg>
      </div>`:''}
    </div>`;
  }).join('')}
  </div></div>`;
}

function renderSectorExplorer(){
  const lastPh=S.curRound>0?S.cycle[S.curRound-1]:S.cycle[0];
  const hist=S.sectorHist;// array of {phase, pes:{sectorId:peValue}}
  return `<div class="card"><h3 style="font-size:17px;margin:0 0 14px">Sector Explorer</h3>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">${SECTORS.map(s=>{
    const pe=getPE(s.id,lastPh),pePct=Math.max(0,Math.min(100,((pe-s.peLow)/(s.peHigh-s.peLow))*100)),peColor=pePct>70?'#ef4444':pePct>40?'#eab308':'#16a34a',betaColor=s.beta>1.2?'#ef4444':s.beta>.9?'#eab308':'#16a34a',isOff=s.type==='offensive';
    const angle=Math.PI-(pePct/100)*Math.PI,cx=100,cy=100,nl=52,nx=cx+nl*Math.cos(angle),ny=cy-nl*Math.sin(angle);
    // PE history sparkline
    const peHist=hist.map(h=>h.pes[s.id]);
    let sparkSVG='',peChange='';
    if(peHist.length>0){
      const first=peHist[0],last=peHist[peHist.length-1],diff=last-first;
      peChange=diff>0?`<span style="color:#ef4444;font-size:11px;font-weight:700">↑${diff} from R1</span>`:diff<0?`<span style="color:#16a34a;font-size:11px;font-weight:700">↓${Math.abs(diff)} from R1</span>`:`<span style="color:var(--muted);font-size:11px">unchanged</span>`;
      if(peHist.length>1){
        const minP=Math.min(...peHist,s.peLow),maxP=Math.max(...peHist,s.peHigh),range=maxP-minP||1;
        const w=120,h=30;

          ${peHist.map((v,i)=>`<circle cx="${(i/(peHist.length-1))*w}" cy="${h-((v-minP)/range)*h}" r="3" fill="${s.color}" stroke="white" stroke-width="1"/>`).join('')}
        </svg>
        <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--muted);margin-top:2px"><span>R1</span><span>R${peHist.length}</span></div>`;

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:28px">${s.icon}</span><span style="font-family:var(--font-d);font-size:22px;font-weight:900;color:${s.color}">${s.name}</span><span class="phase-badge" style="margin-left:auto;background:${isOff?'#fef2f2':'#eff6ff'};color:${isOff?'#b91c1c':'#1d4ed8'};font-size:10px">${isOff?'🏈 Offensive':'🛡️ Defensive'}</span></div>
      <div style="text-align:center;font-size:13px;color:#666;margin-bottom:2px">${s.desc}</div>
      <div style="text-align:center;font-size:12px;color:#aaa;font-style:italic;margin-bottom:12px">${s.examples}</div>
      <div style="display:flex;gap:28px;justify-content:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div style="text-align:center"><div style="font-size:11px;color:var(--muted)">β Beta</div><div style="font-family:var(--font-d);font-size:22px;font-weight:900;color:${betaColor}">${s.beta}</div></div>
        <div style="text-align:center"><div style="font-size:11px;color:var(--muted)">🪙 Dividend</div><div style="font-family:var(--font-d);font-size:22px;font-weight:900;color:var(--green)">${(s.div*100).toFixed(1)}%</div></div>
      </div>
      <div style="background:#fafaf8;border-radius:12px;padding:14px;border:1px solid #e8e5e0">
        <div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:10px;color:var(--muted);letter-spacing:1.5px;font-weight:700">📊 PE RATIO</span>${peChange}</div>
        <svg viewBox="0 0 200 120" width="180" height="108" style="display:block;margin:0 auto">
          <path d="M 20 100 A 80 80 0 0 1 53 38" fill="none" stroke="#2d8a4e" stroke-width="16" stroke-linecap="round" opacity=".55"/>
          <path d="M 58 33 A 80 80 0 0 1 142 33" fill="none" stroke="#eab308" stroke-width="16" stroke-linecap="round" opacity=".55"/>
          <path d="M 147 38 A 80 80 0 0 1 180 100" fill="none" stroke="#ef4444" stroke-width="16" stroke-linecap="round" opacity=".55"/>
          <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="4" fill="#1a1a1a"/>
          <circle cx="${cx}" cy="112" r="18" fill="white" stroke="${peColor}" stroke-width="2"/><text x="${cx}" y="117" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="20" font-weight="900" fill="${peColor}">${pe}</text>
        </svg>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;font-size:9px;font-weight:600"><span style="color:#2d8a4e">Cheap (${s.peLow})</span><span style="color:#eab308;text-align:center">Fair Value</span><span style="color:#ef4444;text-align:right">Expensive (${s.peHigh})</span></div>
        ${sparkSVG?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid #e8e5e0"><div style="text-align:center;font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:600;margin-bottom:2px">PE HISTORY</div>${sparkSVG}</div>`:''}
      </div></div>`}).join('')}</div></div>`;
}

      </div>

    ${!allRevealed?`<div id="reasonCounter" style="text-align:center;margin-top:16px;font-size:13px;color:#a8a29e">Press <kbd style="background:rgba(255,255,255,.1);padding:2px 8px;border-radius:4px;font-family:var(--font-m)">spacebar</kbd> to reveal the next explanation (${S._reasonsRevealed}/${reasonSectors.length})</div>`:''}
    <div style="text-align:center;margin-top:${allRevealed?'28':'12'}px"><button id="commBtn" class="btn btn-gold" style="font-size:17px;padding:16px 44px;${allRevealed?'':'opacity:0.3;pointer-events:none'}" onclick="showComm()">📢 Commentary</button></div></div>`;
  } else if(S.newsStep===3){// Commentary
    content=`<div style="animation:slideUp .4s ease"><div class="commentary" style="background:rgba(255,255,255,.06);color:#e8e5e0;margin-bottom:28px">${S.commentary.map(l=>`<div style="margin-bottom:8px;font-size:18px">${l}</div>`).join('')}</div>

  }
  return `<div class="round-screen ${isBear?'bear':'bull'}"><div class="container" style="max-width:960px;margin:0 auto">${content}</div></div>`;
}

function toggleResultPlayer(name){S._expandedResult=S._expandedResult===name?null:name;render();}

function renderResults(){
  const idxF=S.idxHist[S.idxHist.length-1];
  const allEntries=[...S.players.map(p=>({name:p.name,val:p.history[p.history.length-1],isIdx:false})),{name:'Market Index',val:idxF,isIdx:true}].sort((a,b)=>b.val-a.val);
  const beaters=allEntries.filter(e=>!e.isIdx&&e.val>idxF);
  const rc=['#c5a55a','#94a3b8','#b45309','#475569','#475569','#475569','#475569','#475569','#475569','#475569'];
  let playerRank=0;
  const totalFeeDrag=Math.round((1-Math.pow(1-MGMT_FEE,S.curRound))*1000)/10;

  function holdingBars(port,label){
    const h=Object.entries(port).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    return `<div style="margin-bottom:8px"><div style="font-size:10px;color:var(--muted);letter-spacing:1px;font-weight:600;margin-bottom:6px">${label}</div>${h.map(([sid,amt])=>{
      const s=sid==='cash'?{icon:'🏦',name:'Cash',color:'#059669'}:SECTORS.find(x=>x.id===sid);
      if(!s)return '';
      return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:16px;width:22px;text-align:center">'+s.icon+'</span><span style="font-size:12px;font-weight:700;color:'+s.color+';min-width:100px">'+s.name+'</span><div style="flex:1;height:8px;background:#f0eeeb;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+((amt/BUDGET)*100)+'%;background:'+s.color+';border-radius:4px"></div></div><span style="font-family:var(--font-m);font-size:12px;font-weight:700;min-width:40px;text-align:right">$'+amt+'</span></div>';
    }).join('')}</div>`;
  }

  return `<div class="container" style="animation:fadeIn .5s ease"><div style="text-align:center;margin-bottom:32px"><div style="font-size:56px;margin-bottom:8px">🏆</div><h1 style="font-size:38px;margin:0">Final Results</h1><div style="font-size:15px;color:var(--muted);margin-top:6px">${S.curRound} of ${S.cycle.length} rounds · Game #${S.gameNum}</div></div>
  <div class="card">
    ${allEntries.map((e,i)=>{
      if(e.isIdx) return `<div class="lb-row" style="background:#f5f4f0;border:2px dashed var(--border);animation:slideUp ${.2+i*.1}s ease both"><div class="lb-rank" style="background:var(--muted)">📊</div><div class="lb-name" style="color:var(--muted)">Market Index <span style="font-size:11px;font-weight:400">— cap-weighted, all 10 sectors, no fees</span></div><span class="lb-val" style="color:var(--muted)">$${e.val.toFixed(0)}</span></div>`;
      playerRank++;const bi=e.val>idxF,pctR=((e.val-BUDGET)/BUDGET*100).toFixed(1);
      const p=S.players.find(x=>x.name===e.name);
      const isExpanded=S._expandedResult===e.name;
      const didRebalance=JSON.stringify(p.portfolio)!==JSON.stringify(p.initialPortfolio);
      return `<div style="animation:slideUp ${.2+i*.1}s ease both">
        <div class="lb-row">
          <div class="lb-rank" style="background:${rc[playerRank-1]||'#475569'}">${playerRank}</div>
          <div class="lb-name">${e.name}</div>
          <div style="display:flex;align-items:center;gap:12px">
            <button onclick="toggleResultPlayer('${e.name.replace(/'/g,"\\'")}');event.stopPropagation()" style="padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:${isExpanded?'var(--accent)':'var(--card)'};color:${isExpanded?'#1a1a1a':'var(--muted)'};font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-b);white-space:nowrap">${isExpanded?'Hide':'See Portfolio'}</button>
            <div style="text-align:right"><div class="lb-val">$${e.val.toFixed(0)}</div><div style="font-size:12px;color:${bi?'var(--green)':'var(--red)'}">${bi?'✓ Beat Index':'✗ Below Index'} · ${pctR>0?'+':''}${pctR}%</div></div>
          </div>
        </div>
        ${isExpanded?`<div style="padding:14px 18px 16px 60px;background:#fafaf8;border-radius:0 0 12px 12px;margin-top:-6px;margin-bottom:8px;border:1px solid var(--border);border-top:none;animation:fadeIn .3s ease">
          ${didRebalance?holdingBars(p.initialPortfolio,'ORIGINAL PORTFOLIO')+holdingBars(p.portfolio,'AFTER REBALANCE'):holdingBars(p.portfolio,'PORTFOLIO')}
        </div>`:''}
      </div>`;
    }).join('')}
  </div>
  ${(()=>{
    const lessons=[];
    if(beaters.length===0) lessons.push('<strong style="color:var(--accent)">1. The index beat everyone.</strong> A simple, low-cost index fund — owning a little of everything — outperformed every active portfolio. This happens more often than you\'d think: over any 15-year period, roughly 90% of professional money managers lose to the index.');
    else if(beaters.length<=Math.ceil(S.players.length/3)) lessons.push('<strong style="color:var(--accent)">1. The index beat almost everyone.</strong> Only '+beaters.length+' of '+S.players.length+' players beat the index. In real life, most professional money managers — people who do this for a living — can\'t beat it either.');
    else if(beaters.length<=S.players.length/2) lessons.push('<strong style="color:var(--accent)">1. Beating the index is possible — but hard to repeat.</strong> '+beaters.length+' of '+S.players.length+' players beat the index this game. But could they do it again? Research shows that managers who beat the index one year usually don\'t repeat it the next.');
    else lessons.push('<strong style="color:var(--accent)">1. This time, picking winners worked — but don\'t count on it.</strong> '+beaters.length+' of '+S.players.length+' players beat the index! That feels great. But studies show that even when investors pick the right sectors, most fall behind over 10+ years. One good game doesn\'t make a strategy.');
    lessons.push('<strong style="color:var(--accent)">2. Nobody saw it coming.</strong> Think back to Round 1 — did anyone predict exactly what would happen? '+(S.roundHist.length>0?'We saw '+S.roundHist.filter(r=>PHASES.find(p=>p.id===r.phase)?.mood==='bear').length+' bear rounds and '+S.roundHist.filter(r=>PHASES.find(p=>p.id===r.phase)?.mood==='bull').length+' bull rounds.':'')+' The economy surprised everyone, just like in real life.');
    lessons.push('<strong style="color:var(--accent)">3. Offensive vs. Defensive is a real trade-off.</strong> High-beta sectors like Tech and Energy swing big both ways — great in expansions, painful in recessions. Low-beta sectors like Utilities and Healthcare are steadier. Neither is &quot;better&quot; — it depends on what happens next, and nobody knows that in advance.');
    lessons.push('<strong style="color:var(--accent)">4. Dividends are your silent partner.</strong> Every round, dividend-paying sectors added a small bonus. Over '+S.curRound+' rounds, those payments compound — especially during downturns when stock prices fall but dividends keep paying.');
    lessons.push('<strong style="color:var(--accent)">5. Fees quietly eat your lunch.</strong> Every round, active portfolios paid a '+(MGMT_FEE*100).toFixed(1)+'% management fee — about '+totalFeeDrag+'% total over the game. The index paid nothing. In real life, the average mutual fund charges ~1% per year, which adds up to tens of thousands of dollars over a career.');
    lessons.push('<strong style="color:var(--accent)">6. Time in the market beats timing the market.</strong> The best strategy for most people: buy a diversified, low-cost index fund, keep adding to it, and don\'t panic when markets drop. Boring? Yes. Effective? Extremely.');
    const li=S._lessonIdx||0;
    return '<div class="card" style="background:#1a1a1a;color:#e8e5e0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h3 style="font-size:20px;margin:0;color:var(--accent)">📚 What Did We Learn?</h3><div style="font-size:14px;color:#a8a29e">'+(li+1)+' of '+lessons.length+'</div></div>'+
      '<div style="font-size:22px;line-height:1.7;min-height:120px;animation:fadeIn .4s ease" id="lessonText">'+lessons[li]+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px">'+
        (li>0?'<button class="btn btn-outline" style="color:#a8a29e;border-color:#555" onclick="S._lessonIdx='+(li-1)+';render()">← Previous</button>':'<div></div>')+
        (li<lessons.length-1?'<button class="btn btn-gold" style="font-size:16px;padding:14px 36px" onclick="S._lessonIdx='+(li+1)+';render()">Next Lesson →</button>':'<div style="font-size:14px;color:var(--accent);font-weight:700">✓ All lessons complete</div>')+
      '</div></div>';
  })()}
  <div style="display:flex;gap:12px;justify-content:center;margin-top:24px"><button class="btn btn-primary" style="font-size:17px;padding:16px 44px" onclick="resetGame()">🔄 Play Again (Same Players)</button><button class="btn btn-gold" style="font-size:17px;padding:16px 44px" onclick="newGame()">🆕 New Game</button><button class="btn btn-outline" onclick="setState({screen:'play'})">← Dashboard</button></div></div>`;
}

// ===================== EVENTS =====================
function attachEvents(){
  // Cycle chip editing
  if(S.dmMode)document.querySelectorAll('.cyc-chip').forEach(ch=>{ch.addEventListener('click',function(){const idx=Number(this.dataset.idx),curId=S.cycle[idx],ci=PHASES.findIndex(p=>p.id===curId);S.cycle[idx]=PHASES[(ci+1)%PHASES.length].id;playClick();render()})});
}

// Spacebar / Right Arrow / Tap to advance through gameplay
function advanceGame(){
  // If shuffle is running, cut it off immediately
  if(S._battleInterval){finishBattle();return;}
  // If on returns page with unrevealed reasons, reveal next one
  if(S.screen==='round'&&S.newsStep===2&&S._reasonSectors&&S._reasonsRevealed<S._reasonSectors.length){
    revealNextReason();return;
  }
  // Otherwise find the primary action button and click it
  const btns=document.querySelectorAll('.btn-primary,.btn-gold,.btn-green');
  for(let i=btns.length-1;i>=0;i--){
    const b=btns[i];
    if(!b.disabled&&b.offsetParent!==null&&b.textContent.trim()&&b.style.pointerEvents!=='none'){b.click();return;}
  }
}
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'||e.code==='ArrowRight'){e.preventDefault();advanceGame();}
});

function revealNextReason(){
  if(!S._reasonSectors||S._reasonsRevealed>=S._reasonSectors.length)return;
  const idx=S._reasonsRevealed;
  const sid=S._reasonSectors[idx];
  const reason=S.curNews.reasons&&S.curNews.reasons[sid]?S.curNews.reasons[sid]:'';
  const el=document.getElementById('reason-'+idx);
  if(el&&reason){
    el.style.color='#a8a29e';
    el.style.cursor='default';
    el.textContent='💡 '+reason;
    el.onclick=null;
    el.style.animation='fadeIn .4s ease';
  }
  S._reasonsRevealed++;
  playReveal();
  // Update counter
  const counter=document.getElementById('reasonCounter');
  if(counter){
    if(S._reasonsRevealed>=S._reasonSectors.length){
      counter.style.display='none';
      // Enable commentary button
      const commBtn=document.getElementById('commBtn');
      if(commBtn){commBtn.style.opacity='1';commBtn.style.pointerEvents='auto';}
    } else {
      counter.textContent='Press spacebar to reveal the next explanation ('+S._reasonsRevealed+'/'+S._reasonSectors.length+')';
    }
  }
}

// ===================== ACTIONS =====================
function loadDemoPlayers(){
  const names=['Sarah','Marcus','Zoe','Chris','Aiden','Lily'];
  const sids=SECTORS.map(s=>s.id);
  function randPort(){
    // Pick 3 random sectors
    const shuffled=[...sids].sort(()=>Math.random()-.5);
    const picks=shuffled.slice(0,3);
    // Random cash: 0, 0, 0, 100, 150, 200, 250 (weighted toward no cash)
    const cashOpts=[0,0,0,0,100,150,200,250];
    const cash=cashOpts[Math.floor(Math.random()*cashOpts.length)];
    const remaining=BUDGET-cash;
    // Random split across 3 sectors in $50 increments
    const slots=remaining/50;
    let a=Math.floor(Math.random()*(slots-2))+1;
    let b=Math.floor(Math.random()*(slots-a-1))+1;
    let c=slots-a-b;
    // Shuffle the allocation order
    let amts=[a*50,b*50,c*50].sort(()=>Math.random()-.5);
    const port={};
    if(cash>0)port.cash=cash;
    picks.forEach((sid,i)=>{port[sid]=amts[i]});
    return port;
  }
  // Pick 4 random names
  const shuffNames=[...names].sort(()=>Math.random()-.5).slice(0,4);
  S.players=shuffNames.map(name=>{
    const port=randPort();
    return {name,portfolio:{...port},initialPortfolio:{...port},history:[BUDGET]};
  });
  playReveal();render();
}
function rmPlayer(i){S.players.splice(i,1);render()}
function loadFromFirebase(){
  const btn=document.getElementById('firebaseBtn');
  if(btn){btn.textContent='⏳ Loading...';btn.disabled=true;}
  fetch(FIREBASE_URL+'/portfolios.json')
  .then(r=>r.json())
  .then(data=>{
    if(!data){if(btn){btn.textContent='No portfolios found';btn.disabled=false;setTimeout(()=>{btn.textContent='🔄 Load Portfolios from Players';},2000);}return;}
    let added=0;
    Object.values(data).forEach(d=>{
      if(!d.name||!d.portfolio)return;
      // Skip if already loaded
      if(S.players.find(p=>p.name===d.name))return;
      const port={...d.portfolio};
      S.players.push({name:d.name,portfolio:{...port},initialPortfolio:{...port},history:[BUDGET]});
      added++;
    });
    if(btn){btn.textContent='✅ Loaded '+added+' player'+(added!==1?'s':'');btn.style.background='var(--green)';btn.style.color='#fff';
      setTimeout(()=>{btn.textContent='🔄 Refresh from Players';btn.style.background='';btn.style.color='';btn.disabled=false;},2000);}
    playReveal();render();
  })
  .catch(err=>{console.error(err);if(btn){btn.textContent='⚠️ Error loading';btn.disabled=false;setTimeout(()=>{btn.textContent='🔄 Load Portfolios from Players';},2000);}});
}
function clearFirebase(){
  if(!confirm('Clear all submitted portfolios from Firebase? This cannot be undone.'))return;
  Promise.all([
    fetch(FIREBASE_URL+'/portfolios.json',{method:'DELETE'}),
    fetch(FIREBASE_URL+'/gameState.json',{method:'DELETE'}),
    fetch(FIREBASE_URL+'/rebalanced.json',{method:'DELETE'})
  ]).then(()=>{render()}).catch(err=>console.error(err));
}
function newGame(){
  if(!confirm('Start a completely new game? This clears all portfolios from Firebase and resets everything. Kids will need to re-submit.'))return;
  Promise.all([
    fetch(FIREBASE_URL+'/portfolios.json',{method:'DELETE'}),
    fetch(FIREBASE_URL+'/gameState.json',{method:'DELETE'}),
    fetch(FIREBASE_URL+'/rebalanced.json',{method:'DELETE'})
  ]).then(()=>{
    S.players=[];S.curRound=0;S.roundHist=[];S.sectorHist=[];S.idxHist=[BUDGET];S.usedNews=new Set();S.commentary=[];S.rebalOpen=false;S.screen='setup';S.playTab='dashboard';S.gameNum++;
    render();
  }).catch(err=>{console.error(err);alert('Error clearing Firebase: '+err.message)});
}
function enableRebalance(){
  // Write game state to Firebase so rebalance page can show performance
  const idxV=S.idxHist[S.idxHist.length-1];
  const playerStates={};
  const sorted=[...S.players].map(p=>({name:p.name,val:p.history[p.history.length-1]})).sort((a,b)=>b.val-a.val);
  sorted.forEach((p,i)=>{
    const full=S.players.find(x=>x.name===p.name);
    const safeName=p.name.replace(/[.#$\/\[\]]/g,'_');
    playerStates[safeName]={name:p.name,currentValue:Math.round(p.val),rank:i+1,totalPlayers:sorted.length,portfolio:full.portfolio};
  });
  const gameState={
    rebalanceOpen:true,
    round:S.curRound,
    totalRounds:S.cycle.length,
    indexValue:Math.round(idxV),
    players:playerStates,
    timestamp:new Date().toISOString()
  };
  const btn=document.getElementById('rebalBtn');
  if(btn){btn.textContent='⏳ Enabling...';btn.disabled=true;}
  fetch(FIREBASE_URL+'/gameState.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(gameState)})
  .then(r=>r.json())
  .then(()=>{
    if(btn){btn.textContent='✅ Rebalance Open — Tell Kids to Open Rebalance Page';btn.style.background='var(--green)';btn.style.color='#fff';}
    S.rebalOpen=true;render();
  })
  .catch(err=>{console.error(err);if(btn){btn.textContent='⚠️ Error';btn.disabled=false;}});
}
function loadRebalanced(){
  const btn=document.getElementById('rebalLoadBtn');
  if(btn){btn.textContent='⏳ Loading...';btn.disabled=true;}
  fetch(FIREBASE_URL+'/rebalanced.json')
  .then(r=>r.json())
  .then(data=>{
    if(!data){if(btn){btn.textContent='No rebalanced portfolios yet';btn.disabled=false;setTimeout(()=>{btn.textContent='🔄 Load Rebalanced Portfolios';},2000);}return;}
    let updated=0;
    Object.values(data).forEach(d=>{
      if(!d.name||!d.portfolio)return;
      const player=S.players.find(p=>p.name===d.name);
      if(player){player.portfolio={...d.portfolio};updated++;}
    });
    if(btn){btn.textContent='✅ Updated '+updated+' portfolio'+(updated!==1?'s':'');btn.style.background='var(--green)';btn.style.color='#fff';
      setTimeout(()=>{btn.textContent='🔄 Refresh Rebalanced';btn.style.background='';btn.style.color='';btn.disabled=false;},2000);}
    // Close rebalance window and reset for next potential rebalance
    fetch(FIREBASE_URL+'/gameState/rebalanceOpen.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(false)});
    fetch(FIREBASE_URL+'/rebalanced.json',{method:'DELETE'});
    S.rebalOpen=false;
    playReveal();render();
  })
  .catch(err=>{console.error(err);if(btn){btn.textContent='⚠️ Error loading';btn.disabled=false;}});
}
function addCycRound(){S.cycle.push('expansion');render()}
function rmCycRound(){if(S.cycle.length>3){S.cycle.pop();render()}}
function startGame(){S.screen='play';S.playTab='dashboard';S.curRound=0;render()}
function startRound(){if(S.curRound>=S.cycle.length)return;const mag=genMag(),phase=S.cycle[S.curRound],news=getNews(phase,S.usedNews);if(news)S.usedNews.add(news.idx);S.mag=mag;S.curNews=news;
  // Random scene, avoiding repeats until all used
  if(!S._usedScenes||S._usedScenes.length>=BULL_SCENES.length)S._usedScenes=[];
  const avail=BULL_SCENES.filter((_,i)=>!S._usedScenes.includes(i));
  const si=Math.floor(Math.random()*avail.length);
  const sceneIdx=BULL_SCENES.indexOf(avail[si]);
  S._usedScenes.push(sceneIdx);S.scene=BULL_SCENES[sceneIdx];
  S.newsStep=0;S.battleDone=false;S.roundRet=null;S.commentary=[];S.screen='round';render()}
function revealBattle(){
  const btn=document.getElementById('battleBtn');if(btn)btn.disabled=true;
  const emojis=['🐂','🐻','📰','📉','📈','💥','⚡','🔥','💰','📊'];
  const shuffleEl=document.getElementById('battleShuffle');
  if(!shuffleEl)return;
  let count=0;const totalTicks=32;
  S._battleInterval=setInterval(()=>{
    const e1=emojis[Math.floor(Math.random()*emojis.length)],e2=emojis[Math.floor(Math.random()*emojis.length)];
    shuffleEl.textContent=e1+' vs '+e2;
    shuffleEl.style.transform=`scale(${1+Math.random()*0.2})`;
    playClick();count++;
    if(count>=totalTicks){finishBattle();}
  },100);
}
function finishBattle(){
  if(S._battleInterval){clearInterval(S._battleInterval);S._battleInterval=null;}
  if(S.battleDone)return;
  // Battle outcome matches the headline mood, not the phase
  const isBear=S.curNews&&S.curNews.mood==='bear';
  if(isBear)playBearWin();else playBullWin();
  S.battleDone=true;render();
}
function advanceNews(){playReveal();S.newsStep=1;render()}
function processRound(){const phase=S.cycle[S.curRound],ret=calcReturns(phase,S.curNews,S.mag);S.roundRet=ret;const eqP={tech:30,health:13,fin:13,disc:10,ind:9,tele:8,staples:6,energy:4,util:4,mat:3};const idxR=portReturn(eqP,ret);
  // Apply returns + management fee to players (index is fee-free, cash is fee-free)
  S.players.forEach(p=>{const r=portReturn(p.portfolio,ret),last=p.history[p.history.length-1];const afterReturn=last*(1+r);
    // Fee only applies to non-cash portion
    const totalAlloc=Object.values(p.portfolio).reduce((s,v)=>s+v,0);const cashAmt=p.portfolio.cash||0;const eqPct=totalAlloc>0?(totalAlloc-cashAmt)/totalAlloc:1;
    const fee=MGMT_FEE*eqPct;const afterFee=afterReturn*(1-fee);p.history.push(afterFee)});
  const lastI=S.idxHist[S.idxHist.length-1];S.idxHist.push(lastI*(1+idxR));
  S.commentary=genCommentary(S.players,ret,idxR,phase);
  S.roundHist.push({phase,news:S.curNews,mag:S.mag,returns:ret});
  // Record sector PE history
  const peSnap={};SECTORS.forEach(s=>{peSnap[s.id]=getPE(s.id,phase)});S.sectorHist.push({phase,pes:peSnap});
  S._reasonsRevealed=0;S.newsStep=2;render()}
function showComm(){S.newsStep=3;render()}
function finishRound(){S.curRound++;S.screen='play';S.playTab='dashboard';render()}
function showResults(){S._lessonIdx=0;S.screen='results';render()}
function endGameEarly(){
  if(S.curRound<1){alert('Play at least one round first.');return;}
  try{
    S._lessonIdx=0;S.screen='results';render();
  }catch(e){alert('Error: '+e.message+'\n'+e.stack);}
}
function restartGame(){
  if(!confirm('Restart the game from Round 1? Players and portfolios will be kept.'))return;
  S.players.forEach(p=>{p.history=[BUDGET];p.portfolio={...p.initialPortfolio}});
  S.curRound=0;S.roundHist=[];S.sectorHist=[];S.idxHist=[BUDGET];S.usedNews=new Set();S.commentary=[];S.rebalOpen=false;S._usedScenes=[];S.playTab='dashboard';
  fetch(FIREBASE_URL+'/gameState.json',{method:'DELETE'}).catch(()=>{});
  fetch(FIREBASE_URL+'/rebalanced.json',{method:'DELETE'}).catch(()=>{});
  render();
}
function resetGame(){S.players.forEach(p=>{p.history=[BUDGET];p.portfolio={...p.initialPortfolio}});S.curRound=0;S.roundHist=[];S.sectorHist=[];S.idxHist=[BUDGET];S.usedNews=new Set();S.gameNum++;S.commentary=[];S.rebalOpen=false;S.screen='play';S.playTab='dashboard';
  // Clear stale game state from Firebase so player page doesn't show rebalance mode
  fetch(FIREBASE_URL+'/gameState.json',{method:'DELETE'}).catch(()=>{});
  fetch(FIREBASE_URL+'/rebalanced.json',{method:'DELETE'}).catch(()=>{});
  render()}

render();
